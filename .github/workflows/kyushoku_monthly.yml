# .github/workflows/kyushoku_monthly.yml
# このファイルを自分のGitHubリポジトリの .github/workflows/ に置く
#
# 毎月28日の朝9時（JST）に自動実行（翌月分の献立公開に合わせて取得）
# → CSVを kyushoku_output/ にコミット

name: 給食献立 月次取得

on:
  schedule:
    # UTC 0:00 = JST 9:00, 毎月28日
    - cron: "0 0 28 * *"
  workflow_dispatch:  # 手動実行も可能

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存ライブラリをインストール
        run: |
          pip install requests beautifulsoup4 pdfplumber

      - name: スクレイパーを実行
        run: |
          python kyushoku_scraper.py

      - name: CSVをコミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kyushoku_output/
          git diff --staged --quiet || git commit -m "chore: $(date '+%Y年%m月') 給食献立データ更新"
          git push
